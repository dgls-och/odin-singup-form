<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>signup</title>
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <div class="form-container">
        <main class="main">
            <div class="images">
                <img src="./img/odin-lined.png" alt="white odin-lined logo" width="50" />
                <span>ODIN</span>
                <img src="./img/halie-west-25xggax4bSA-unsplash.jpg" alt="green leave on close up" width="400" />
            </div>
            <div class="form-and-signin-link">
                <form action="#">
                    <p>
                        <strong>
                            This is not a real online service! You know you need something like this in your life to
                            help you realize your deepest dreams. Sing up now to get started.
                        </strong>
                    </p>
                    <p>
                        <strong>
                            You <em>know</em> you want to.
                        </strong>
                    </p>
                    <fieldset>
                        <legend>Let's do this!</legend>
                        <label for="first-name">
                            First Name
                            <input type="text" id="first-name" />
                        </label>
                        <label for="last-name">
                            Last Name
                            <input type="text" id="last-name" />
                        </label>
                        <label for="email">
                            Email
                            <input type="email" id="email" />
                        </label>
                        <label for="phone-number">
                            Phone Number
                            <input type="phone" />
                        </label>
                        <label for="password">
                            Password
                            <input type="password" id="password" />
                        </label>
                        <label for="password">
                            Confirm Password
                            <input type="password" id="password" />
                        </label>
                    </fieldset>
                    <button>create account</button>
                </form>
                <p class="login-link">Already have an account? <a href="#">Log in</a></p>
            </div>
        </main>
        <footer class="footer">
            <p class="credit-text">
                Photo by <a
                    href="https://unsplash.com/@haliewestphoto?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Halie
                    West</a> on <a
                    href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
            </p>
        </footer>
    </div>
</body>

</html>
